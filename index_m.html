<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>두타위키</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --bg-main: #f5f5f5; --bg-card: #fff; --pink-50: #ebebeb; --pink-100: #e0e0e0; --pink-200: #bdbdbd; --pink-300: #9e9e9e; --pink-400: #757575; --pink-500: #616161; --pink-600: #424242;
    --text-primary: #212121; --text-secondary: #616161; --text-tertiary: #9e9e9e; --border: #e0e0e0;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.08); --shadow-md: 0 4px 12px rgba(0,0,0,0.12); --shadow-lg: 0 12px 24px rgba(0,0,0,0.16);
}
body.dark {
    --bg-main: #1a1a1a; --bg-card: #2d2d2d; --pink-50: #3a3a3a; --pink-100: #404040; --pink-200: #505050; --pink-300: #606060; --pink-400: #888; --pink-500: #aaa; --pink-600: #ccc;
    --text-primary: #e8e8e8; --text-secondary: #b0b0b0; --text-tertiary: #808080; --border: #404040;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3); --shadow-md: 0 4px 12px rgba(0,0,0,0.4); --shadow-lg: 0 12px 24px rgba(0,0,0,0.5);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-primary); line-height: 1.6; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
.sticky-top { position: sticky; top: 0; z-index: 100; background: var(--bg-main); }
header { background: var(--bg-card); padding: 40px 24px 32px; text-align: center; border-bottom: 1px solid var(--border); position: relative; }
.title-wrap { margin: 0 auto; max-width: 480px; }
.title-row { display: flex; justify-content: center; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.title-row .app-version { font-size: 0.75rem; color: var(--text-tertiary); font-weight: normal; }
.dark-mode-toggle { position: absolute; top: 16px; right: 24px; width: 40px; height: 40px; border: 1px solid var(--border); border-radius: 50%; background: var(--bg-card); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.dark-mode-toggle:hover { background: var(--pink-50); }
body.dark .dark-mode-toggle { background: var(--pink-100); }
h1 { font-size: 2.2rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.03em; line-height: 1.2; }
.title-sub { font-size: 0.85rem; color: var(--text-tertiary); margin-top: 8px; }
.empty-hint { margin-top: 14px; font-size: 0.8rem; color: var(--text-secondary); }
.empty-hint strong { color: var(--text-primary); }
.tabs { display: flex; justify-content: center; gap: 8px; padding: 16px; background: var(--bg-card); border-bottom: 1px solid var(--border); }
.tab-btn { background: transparent; border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; color: var(--text-secondary); }
.tab-btn:hover { background: var(--pink-50); }
.tab-btn.active { background: var(--pink-500); color: white; border-color: var(--pink-500); }
.count { font-size: 12px; opacity: 0.8; margin-left: 6px; }
.controls { max-width: 1200px; margin: 24px auto; padding: 0 24px 8px; }
.filter-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 160px; }
.filter-selects-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.search-box input, .filter-row select { height: 40px; padding: 0 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg-card); color: var(--text-primary); width: 100%; }
.filter-selects-row select { width: 130px; }
.action-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
.action-row label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); cursor: pointer; }
.action-row button { height: 36px; padding: 0 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; background: var(--bg-card); color: var(--text-secondary); }
.action-row button:hover { background: var(--pink-50); color: var(--text-primary); }
.action-row button.primary { background: var(--pink-500); color: white; border-color: var(--pink-500); }
.grid { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; align-content: start; }
.list-item { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; transition: box-shadow 0.2s; }
.list-item:hover { box-shadow: var(--shadow-sm); }
.list-item.collected { opacity: 0.6; }
.list-item.open { grid-column: 1 / -1; z-index: 1; }
.list-item-ghost { opacity: 0.45; cursor: pointer; position: relative; z-index: 15; pointer-events: auto; }
.list-item-ghost .list-item-detail { display: none !important; pointer-events: none; }
.list-item-ghost .ghost-overlay { position: absolute; inset: 0; z-index: 5; cursor: pointer; border: none; background: transparent; width: 100%; height: 100%; padding: 0; font: inherit; color: inherit; }
.list-item-name { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
.list-item-name .icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
.list-item-name .name { font-size: 15px; font-weight: 600; color: var(--text-primary); flex: 1; min-width: 0; }
.list-item-name .chevron { font-size: 14px; color: var(--text-tertiary); transition: transform 0.2s; flex-shrink: 0; }
.list-item.open .list-item-name .chevron { transform: rotate(180deg); }
.list-item-detail { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.list-item.open .list-item-detail { display: block; padding-top: 12px; }
.detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
.detail-label { color: var(--text-tertiary); }
.detail-value { color: var(--text-secondary); text-align: right; max-width: 70%; word-break: break-word; }
.star-rating { display: flex; gap: 2px; font-size: 14px; margin-top: 8px; }
.star { cursor: pointer; color: #e0e0e0; }
.star.filled { color: #FFD700; }
.detail-row-price .star-adj { width: 28px; height: 28px; padding: 0; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); cursor: pointer; font-size: 16px; line-height: 1; color: var(--text-secondary); }
.detail-row-price .star-adj:hover { background: var(--pink-50); color: var(--text-primary); }
.detail-row-price .star-display { font-size: 13px; color: var(--text-secondary); min-width: 1.8em; text-align: center; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: center; }
.modal.show { display: flex; }
.modal-content { background: var(--bg-card); border-radius: 16px; padding: 24px; max-width: 480px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: var(--shadow-lg); }
.modal-close { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; background: var(--pink-50); border: none; border-radius: 50%; font-size: 18px; cursor: pointer; }
.modal-close:hover { background: var(--pink-500); color: white; }
.modal-content h2 { margin-bottom: 20px; font-size: 20px; }
.btn-save { background: var(--pink-500); color: white; height: 42px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.empty-state { grid-column: 1/-1; text-align: center; padding: 60px 24px; color: var(--text-tertiary); }
.empty-state-icon { font-size: 40px; margin-bottom: 12px; }
.loading { text-align: center; padding: 40px; color: var(--text-tertiary); grid-column: 1/-1; }

/* 모바일 버전 (768px 이하) */
@media (max-width: 768px) {
    body { padding-bottom: 80px; padding-top: env(safe-area-inset-top, 0); }
    header { padding: 16px 12px 14px; }
    .dark-mode-toggle { top: 10px; right: 12px; width: 40px; height: 40px; font-size: 18px; }
    h1 { font-size: 1.5rem; }
    .title-sub { font-size: 0.75rem; margin-top: 4px; }
    .title-wrap .empty-hint { margin-top: 8px; }
    .empty-hint { font-size: 0.7rem; padding: 0 2px; }
    .tabs { padding: 8px 6px; gap: 4px; flex-wrap: nowrap; justify-content: center; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab-btn { padding: 8px 10px; font-size: 12px; min-height: 38px; min-width: 0; flex-shrink: 0; white-space: nowrap; }
    .tab-btn .count { font-size: 11px; margin-left: 2px; }
    .controls { margin: 8px auto; padding: 0 10px 6px; max-width: 100%; overflow: hidden; }
    .filter-row { flex-direction: column; gap: 6px; margin-bottom: 4px; align-items: stretch; min-width: 0; }
    .search-box { width: 100%; min-width: 0; flex: none; max-width: 100%; }
    .search-box input { height: 36px; padding: 0 10px; font-size: 16px; }
    .filter-selects-row { display: flex; gap: 6px; flex-wrap: nowrap; min-width: 0; width: 100%; }
    .filter-selects-row select { height: 36px; padding: 0 8px; font-size: 14px; flex: 1 1 0; min-width: 0; width: 0; max-width: calc((100% - 12px) / 3); box-sizing: border-box; }
    .filter-selects-row select#recipeSortBy { max-width: calc((100% - 18px) / 4); }
    .action-row { margin-bottom: 0; gap: 8px; min-height: 36px; align-items: center; }
    .action-row label { font-size: 13px; min-height: auto; }
    .action-row label input { width: 18px; height: 18px; }
    .action-row button { height: 36px; padding: 0 12px; font-size: 13px; min-height: 36px; }
    .grid { padding: 0 12px; grid-template-columns: 1fr; gap: 8px; }
    .list-item-name { padding: 16px 14px; min-height: 52px; }
    .list-item-name .icon { font-size: 24px; width: 36px; }
    .list-item-name .name { font-size: 16px; }
    .list-item-detail { padding: 12px 14px 16px; }
    .detail-row { padding: 8px 0; font-size: 14px; }
    .detail-row-price .star-adj { width: 36px; height: 36px; font-size: 18px; min-width: 36px; min-height: 36px; }
    .star-rating { font-size: 18px; gap: 4px; margin-top: 10px; }
    .star { padding: 4px; }
    .modal-content { width: 95%; max-width: none; max-height: 85vh; padding: 20px 16px; margin: 12px; border-radius: 12px; }
    .modal-close { width: 40px; height: 40px; top: 10px; right: 10px; font-size: 22px; }
    .btn-save { height: 48px; font-size: 15px; min-height: 48px; }
    .empty-state { padding: 40px 16px; }
    .loading { padding: 32px 16px; font-size: 15px; }
}
@media (max-width: 768px) {
    .list-item-detail .detail-row:last-child { display: none !important; }
    .action-row label:first-of-type { display: none !important; }
    .list-item.collected { opacity: 1; }
}
@media (max-width: 480px) {
    header { padding: 14px 10px 12px; }
    .controls { padding: 0 8px 6px; }
    .filter-selects-row select { font-size: 13px; padding: 0 4px; max-width: calc((100% - 12px) / 3); }
    .filter-selects-row select#recipeSortBy { max-width: calc((100% - 18px) / 4); }
}
    </style>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="sticky-top">
    <header>
        <button type="button" id="darkModeToggle" class="dark-mode-toggle" title="다크 모드">🌙</button>
        <div class="title-wrap">
            <div class="title-row">
                <h1>두타위키</h1>
                <span id="versionInfo" class="app-version"></span>
            </div>
            <p class="title-sub">어류 · 곤충 · 조류 · 요리</p>
            <p id="madeBy" class="title-sub" style="margin-top:2px; font-size:0.7rem; color:var(--text-tertiary);">Made By 을현</p>
            <p id="emptyDataHint" class="empty-hint" style="display:none;">데이터가 비어 있습니다. <strong>데이터 새로고침</strong>을 눌러 주세요. (GitHub 저장소의 heartowiki.xlsx에서 불러옵니다.)</p>
            <p id="dataErrorHint" class="empty-hint" style="display:none; margin-top:8px; color:#c62828; font-size:0.9rem;"></p>
        </div>
    </header>
    <nav class="tabs" id="tabsContainer"></nav>
    <div class="controls">
        <div class="filter-row">
            <div class="search-box"><input type="text" id="searchBox" placeholder="🔍 생물 이름 검색"></div>
            <div class="filter-selects-row">
                <select id="locationFilter"><option value="">🚩 지역 전체</option></select>
                <select id="levelFilter"><option value="">필요 취미 레벨 전체</option></select>
                <select id="weatherFilter"><option value="">🌤️ 날씨 전체</option></select>
                <select id="recipeSortBy" style="display:none;"><option value="excel">기본값</option><option value="price-asc">가격 낮은순</option><option value="price-desc">가격 높은순</option></select>
            </div>
        </div>
        <div class="action-row">
            <label><input type="checkbox" id="hideCompleted"> 미수집만 표시</label>
            <button type="button" id="btnRefresh" class="primary">🔄 데이터 새로고침</button>
        </div>
    </div>
    </div>
    <div id="dataGrid" class="grid">
        <div class="loading" id="loadingState">데이터를 불러오는 중...</div>
    </div>
    <div id="updateModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="closeUpdateModal">×</button>
            <h2>📦 업데이트</h2>
            <p id="updateMessage" style="margin-bottom:16px; color:var(--text-secondary);"></p>
            <p id="updateDataHint" style="font-size:13px; color:var(--pink-600); margin-bottom:12px; display:none;"></p>
            <p id="updateHint" style="font-size:13px; color:var(--text-tertiary); margin-bottom:16px;">웹 버전에서는 앱 업데이트가 없습니다.</p>
            <button type="button" id="btnUpdateApply" class="btn-save" style="width:100%; margin-bottom:8px; display:none;">업데이트 적용</button>
            <button type="button" id="btnUpdateDownload" class="btn-save" style="width:100%; background:var(--pink-300); display:none;">브라우저로 다운로드</button>
        </div>
    </div>

    <script>
(function() {
    var GITHUB_REPO = 'lir125/heartowiki';
    var GITHUB_BRANCH = 'main';
    var XLSX_PATH = 'heartowiki.xlsx';
    var WEB_XLSX_URL = 'https://raw.githubusercontent.com/' + GITHUB_REPO + '/' + GITHUB_BRANCH + '/' + XLSX_PATH;
    var GITHUB_API_XLSX_URL = 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + XLSX_PATH + '?ref=' + GITHUB_BRANCH;
    var LS_BASE = 'heartowiki_m_base';
    var LS_COLLECTION = 'heartowiki_m_collection';
    var LS_SETTINGS = 'heartowiki_m_settings';

    function val(row, idx) {
        if (idx < 0 || idx >= row.length) return '';
        var v = row[idx];
        return (v != null ? String(v).trim() : '');
    }
    function colIndex(firstRow, name) {
        for (var i = 0; i < firstRow.length; i++) {
            if ((firstRow[i] != null ? String(firstRow[i]).trim() : '') === name) return i;
        }
        return -1;
    }
    function colIndexAny(firstRow, names) {
        for (var n = 0; n < names.length; n++) {
            var i = colIndex(firstRow, names[n]);
            if (i >= 0) return i;
        }
        return -1;
    }
    function xlsxToCreaturesData(ab) {
        if (typeof XLSX === 'undefined') throw new Error('엑셀 파싱 라이브러리를 불러올 수 없습니다.');
        var wb = XLSX.read(ab, { type: 'array', cellDates: false, cellNF: false, cellText: false });
        var result = { 어류: [], 곤충: [], 조류: [], 요리: [] };
        var names = wb.SheetNames || [];

        if (names.indexOf('도감 정보') >= 0) {
            var wsInfo = wb.Sheets['도감 정보'];
            var rowsInfo = XLSX.utils.sheet_to_json(wsInfo, { header: 1 });
            if (rowsInfo && rowsInfo.length > 1) {
                var firstInfo = rowsInfo[0].map(function(c) { return (c != null ? String(c).trim() : ''); });
                var iVer = firstInfo.indexOf('도감 버전');
                if (iVer >= 0 && rowsInfo[1][iVer] != null && String(rowsInfo[1][iVer]).trim())
                    result.data_version = String(rowsInfo[1][iVer]).trim();
            }
        }

        var sheetFish = names.indexOf('어류 관찰') >= 0 ? '어류 관찰' : (names.indexOf('어류') >= 0 ? '어류' : null);
        if (sheetFish) {
            var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetFish], { header: 1 });
            if (rows && rows.length > 0) {
                var first = rows[0].map(function(c) { return (c != null ? String(c).trim() : ''); });
                var iName = colIndexAny(first, ['이름', '명칭']);
                if (iName >= 0) {
                    var iLevel = colIndex(first, '레벨'), iLoc = colIndexAny(first, ['위치', '지역']), iSize = colIndex(first, '크기');
                    var iPrice = colIndex(first, '가격'), iTime = colIndex(first, '시간대'), iWeather = colIndex(first, '날씨'), iNote = colIndex(first, '비고');
                    for (var r = 1; r < rows.length; r++) {
                        var row = rows[r];
                        var name = val(row, iName);
                        if (!name) continue;
                        result.어류.push({ 명칭: name, 지역: val(row, iLoc), 세부지역: '', 레벨: val(row, iLevel), 날씨영향: val(row, iWeather), 이미지: '', 크기: val(row, iSize), 가격: val(row, iPrice), 시간대: val(row, iTime), 비고: val(row, iNote) });
                    }
                }
            }
        }

        var sheetBirds = names.indexOf('새 관찰 일지') >= 0 ? '새 관찰 일지' : (names.indexOf('조류') >= 0 ? '조류' : (names.indexOf('새') >= 0 ? '새' : null));
        if (!sheetBirds) { for (var n = 0; n < names.length; n++) { if ((names[n] || '').indexOf('조류') >= 0) { sheetBirds = names[n]; break; } } }
        if (sheetBirds) {
            var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetBirds], { header: 1 });
            if (rows && rows.length > 0) {
                var first = rows[0].map(function(c) { return (c != null ? String(c).trim() : ''); });
                var iName = colIndexAny(first, ['이름', '명칭']);
                if (iName >= 0) {
                    var iLevel = colIndex(first, '레벨'), iLoc = colIndexAny(first, ['위치', '지역']), iSub = colIndex(first, '세부위치');
                    var iTime = colIndex(first, '시간대'), iWeather = colIndexAny(first, ['날씨', '날씨영향']);
                    for (var r = 1; r < rows.length; r++) {
                        var row = rows[r];
                        var name = val(row, iName);
                        if (!name) continue;
                        result.조류.push({ 명칭: name, 지역: val(row, iLoc), 세부지역: val(row, iSub), 레벨: val(row, iLevel), 날씨영향: val(row, iWeather), 이미지: '', 시간대: val(row, iTime), 비고: '' });
                    }
                }
            }
        }

        var sheetBug = names.indexOf('곤충 이야기') >= 0 ? '곤충 이야기' : (names.indexOf('곤충') >= 0 ? '곤충' : null);
        if (!sheetBug) { for (var n = 0; n < names.length; n++) { if ((names[n] || '').indexOf('곤충') >= 0) { sheetBug = names[n]; break; } } }
        if (sheetBug) {
            var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetBug], { header: 1 });
            if (rows && rows.length > 0) {
                var first = rows[0].map(function(c) { return (c != null ? String(c).trim() : ''); });
                var iName = colIndexAny(first, ['이름', '명칭']);
                if (iName >= 0) {
                    var iLevel = colIndex(first, '레벨'), iLoc = colIndexAny(first, ['위치', '지역']), iSub = colIndex(first, '세부위치');
                    var iTime = colIndex(first, '시간대'), iWeather = colIndexAny(first, ['날씨', '날씨영향']);
                    for (var r = 1; r < rows.length; r++) {
                        var row = rows[r];
                        var name = val(row, iName);
                        if (!name) continue;
                        result.곤충.push({ 명칭: name, 지역: val(row, iLoc), 세부지역: val(row, iSub), 레벨: val(row, iLevel), 날씨영향: val(row, iWeather), 이미지: '', 시간대: val(row, iTime), 비고: '' });
                    }
                }
            }
        }

        if (names.indexOf('미식 라이프') >= 0) {
            var rows = XLSX.utils.sheet_to_json(wb.Sheets['미식 라이프'], { header: 1 });
            if (rows && rows.length > 0) {
                var first = rows[0].map(function(c) { return (c != null ? String(c).trim() : ''); });
                var iName = colIndex(first, '이름');
                if (iName >= 0) {
                    var iLevel = colIndex(first, '레벨'), iIng = colIndex(first, '재료'), iRecipe = colIndex(first, '레시피'), iPrice = colIndex(first, '가격'), iNote = colIndex(first, '비고');
                    for (var r = 1; r < rows.length; r++) {
                        var row = rows[r];
                        var name = val(row, iName);
                        if (!name) continue;

                document.body.classList.add('dark');
                document.getElementById('darkModeToggle').textContent = '☀️';
            } else {
                document.body.classList.remove('dark');
                document.getElementById('darkModeToggle').textContent = '🌙';
            }
            renderTabs();
            this.setupEvents();
            this.updateFilters();
            this.switchTab(this.currentTab);
        },
        setupEvents() {
            ['searchBox', 'locationFilter', 'levelFilter', 'weatherFilter', 'hideCompleted', 'recipeSortBy'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener(el.type === 'checkbox' ? 'change' : 'input', () => this.render());
            });
            document.getElementById('btnRefresh').addEventListener('click', () => this.refreshFromDrive());
            document.getElementById('darkModeToggle').addEventListener('click', () => {
                const isDark = document.body.classList.toggle('dark');
                const st = Storage.loadSettings();
                Storage.saveSettings({ ...st, darkMode: isDark });
                document.getElementById('darkModeToggle').textContent = isDark ? '☀️' : '🌙';
                document.getElementById('darkModeToggle').title = isDark ? '라이트 모드' : '다크 모드';
            });
            const grid = document.getElementById('dataGrid');
            grid.addEventListener('mousedown', (e) => {
                if (e.target.closest('.list-item-ghost') || e.target.closest('.list-item.open .list-item-name')) { e.preventDefault(); e.stopPropagation(); App.closeOpenCard(); }
            }, true);
            grid.addEventListener('click', (e) => {
                if (e.target.closest('.list-item-ghost') || e.target.closest('.list-item.open .list-item-name')) { e.preventDefault(); e.stopPropagation(); App.closeOpenCard(); }
            }, true);
        },
        switchTab(cat) {
            this.currentTab = cat;
            this.openCard = null;
            this.ghostCard = null;
            document.getElementById('searchBox').value = '';
            document.getElementById('locationFilter').value = '';
            document.getElementById('levelFilter').value = '';
            document.getElementById('weatherFilter').value = '';
            document.getElementById('hideCompleted').checked = false;
            var recipeSortEl = document.getElementById('recipeSortBy');
            if (recipeSortEl) recipeSortEl.value = 'excel';
            renderTabs();
            this.updateFilters();
            document.getElementById('searchBox').placeholder = cat === '요리' ? '🔍 요리 이름 검색' : '🔍 생물 이름 검색';
            this.render();
            window.scrollTo(0, 0);
        },
        updateFilters() {
            const cat = this.currentTab;
            const creatures = this.getAll(cat);
            const isRecipe = cat === '요리';
            document.getElementById('locationFilter').style.display = isRecipe ? 'none' : '';
            document.getElementById('levelFilter').style.display = '';
            document.getElementById('weatherFilter').style.display = isRecipe ? 'none' : '';
            const recipeSortEl = document.getElementById('recipeSortBy');
            if (recipeSortEl) recipeSortEl.style.display = isRecipe ? '' : 'none';
            if (isRecipe && recipeSortEl) {
                const st = Storage.loadSettings();
                const v = (st.recipeSortBy || 'excel');
                if (['excel', 'price-asc', 'price-desc'].indexOf(v) >= 0) recipeSortEl.value = v;
            }
            const locs = FilterManager.getUnique(creatures, '지역');
            const locSel = document.getElementById('locationFilter');
            const cur = locSel.value;
            locSel.innerHTML = '<option value="">🚩 지역 전체</option>';
            locs.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; locSel.appendChild(o); });
            if (locs.includes(cur)) locSel.value = cur;
            const levs = FilterManager.getUnique(creatures, '레벨').filter(l => l);
            levs.sort((a, b) => {
                const na = parseFloat(a), nb = parseFloat(b);
                if (!isNaN(na) && !isNaN(nb)) return na - nb;
                if (!isNaN(na)) return -1;
                if (!isNaN(nb)) return 1;
                return String(a).localeCompare(b);
            });
            const levSel = document.getElementById('levelFilter');
            const curL = levSel.value;
            levSel.innerHTML = '<option value="">필요 취미 레벨 전체</option>';
            levs.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = formatLevelDisplay(l); levSel.appendChild(o); });
            if (levs.includes(curL)) levSel.value = curL;
            const weathers = new Set();
            creatures.forEach(c => {
                if (c.날씨영향) {
                    if (c.날씨영향.includes('비')) weathers.add('비');
                    if (c.날씨영향.includes('해')) weathers.add('해');
                    if (c.날씨영향.includes('무지개')) weathers.add('무지개');
                    if (c.날씨영향.includes('맑')) weathers.add('맑은 날');
                }
            });
            const wSel = document.getElementById('weatherFilter');
            const curW = wSel.value;
            wSel.innerHTML = '<option value="">🌤️ 날씨 전체</option>';
            Array.from(weathers).sort().forEach(w => {
                const o = document.createElement('option'); o.value = w;
                o.textContent = (w === '맑은 날' ? '☀️ ' : w === '무지개' ? '🌈 ' : w === '비' ? '🌧️ ' : w === '해' ? '☀️ ' : '') + w;
                wSel.appendChild(o);
            });
            if (weathers.has(curW)) wSel.value = curW;
        },
        getAll(cat) {
            return [...(CREATURES_DATA[cat] || []), ...(this.userCreatures[cat] || [])];
        },
        render() {
            const grid = document.getElementById('dataGrid');
            let openCard = (this.openCard && this.openCard.tab === this.currentTab) ? this.openCard : null;
            grid.innerHTML = '';
            grid.classList.remove('loading');
            const opt = {
                category: this.currentTab,
                search: document.getElementById('searchBox').value.trim(),
                location: document.getElementById('locationFilter').value,
                level: document.getElementById('levelFilter').value,
                weather: document.getElementById('weatherFilter').value,
                hideCompleted: document.getElementById('hideCompleted').checked
            };
            let creatures = this.getAll(this.currentTab);
            creatures = FilterManager.filter(creatures, opt);
            if (this.currentTab === '요리') {
                const recipeSortEl = document.getElementById('recipeSortBy');
                const recipeSortBy = (recipeSortEl && recipeSortEl.value) ? recipeSortEl.value : 'excel';
                creatures = FilterManager.sort(creatures, recipeSortBy, '요리');
            }
            if (creatures.length === 0) {
                const e = document.createElement('div');
                e.className = 'empty-state';
                e.innerHTML = '<div class="empty-state-icon">🔍</div><div class="empty-state-text">검색 결과가 없습니다</div>';
                grid.appendChild(e);
            } else {
                const ghostFor = openCard && openCard.tab === this.currentTab ? openCard : null;
                creatures.forEach(c => {
                    if (ghostFor && ghostFor.name === c.명칭) grid.appendChild(CardManager.createGhost(c, this.currentTab));
                    const el = CardManager.createListItem(c, this.currentTab);
                    if (openCard && openCard.name === c.명칭) el.classList.add('open');
                    grid.appendChild(el);
                });
            }
            this.updateCounts();
            this.saveSettings();
        },
        updateCounts() {
            Object.keys(CATEGORY_CONFIG).forEach(c => {
                const el = document.getElementById('count-' + c);
                if (el) el.textContent = this.getAll(c).length;
            });
        },
        saveSettings() {
            const prev = Storage.loadSettings();
            const s = { ...prev, currentTab: this.currentTab };
            const recipeSortEl = document.getElementById('recipeSortBy');
            if (this.currentTab === '요리' && recipeSortEl) s.recipeSortBy = recipeSortEl.value;
            Storage.saveSettings(s);
        },
        async refreshFromDrive() {
            var api = getApi();
            if (!api) return;
            document.getElementById('dataGrid').innerHTML = '<div class="loading">데이터를 다시 불러오는 중...</div>';
            document.getElementById('dataGrid').classList.add('loading');
            try {
                var data = await api.refresh_data();
                CREATURES_DATA = data.base || CREATURES_DATA;
                _userState = data.user || _userState;
                CardManager.stars = _userState.stars || {};
                App.userCreatures = _userState.userCreatures || { 어류: [], 곤충: [], 조류: [], 요리: [] };
                var total = (CREATURES_DATA.어류||[]).length + (CREATURES_DATA.곤충||[]).length + (CREATURES_DATA.조류||[]).length + (CREATURES_DATA.요리||[]).length;
                var errHint = document.getElementById('dataErrorHint');
                if (errHint) {
                    var msg2 = data.lastError || '';
                    errHint.textContent = msg2 ? ('데이터 로드 참고: ' + msg2 + ' — 「데이터 새로고침」을 눌러 최신 GitHub 파일을 다시 받아 보세요.') : '';
                    errHint.style.display = msg2 ? 'block' : 'none';
                }
                document.getElementById('emptyDataHint').style.display = total === 0 ? 'block' : 'none';
                setVersionInfo(data.appVersion, data.dataVersion);
                App.updateFilters();
                App.render();
            } catch (e) {
                alert('새로고침 실패: ' + (e.message || e));
            }
        }
    };

    function setVersionInfo(appVersion, dataVersion) {
        var el = document.getElementById('versionInfo');
        if (!el) return;
        el.textContent = appVersion ? 'v' + appVersion : '';
    }

    function checkAppUpdate(silentIfLatest) {
        var api = getApi();
        if (!api) return;
        Promise.all([ api.check_app_update(), api.check_data_update ? api.check_data_update() : Promise.resolve({ hasUpdate: false, latestVersion: '' }) ]).then(function(arr) {
            var appResult = arr[0];
            var dataResult = arr[1] || { hasUpdate: false, currentVersion: '', latestVersion: '' };
            var updateMessage = document.getElementById('updateMessage');
            var updateDataHint = document.getElementById('updateDataHint');
            var updateHint = document.getElementById('updateHint');
            var modal = document.getElementById('updateModal');
            var btnApply = document.getElementById('btnUpdateApply');
            var btnDownload = document.getElementById('btnUpdateDownload');
            updateDataHint.style.display = 'none';
            updateDataHint.textContent = '';
            if (dataResult.hasUpdate && dataResult.latestVersion) {
                updateDataHint.textContent = '도감 데이터 v' + dataResult.latestVersion + ' 사용 가능. "데이터 새로고침"으로 적용하세요.';
                updateDataHint.style.display = 'block';
            }
            if (!appResult.hasUpdate) {
                if (silentIfLatest && !dataResult.hasUpdate) return;
                updateMessage.textContent = dataResult.hasUpdate ? '도감 데이터만 새로 받을 수 있습니다.' : '앱과 도감 데이터 모두 최신 버전입니다.';
                updateHint.style.display = 'none';
                btnApply.style.display = 'none';
                btnDownload.style.display = 'none';
                document.getElementById('closeUpdateModal').onclick = function() { modal.classList.remove('show'); };
                modal.classList.add('show');
                return;
            }
            updateMessage.textContent = appResult.message + ' (버전 ' + appResult.version + ')';
            updateHint.style.display = 'block';
            btnApply.style.display = 'block';
            btnDownload.style.display = 'block';
            var downloadUrl = appResult.download_url || '';
            var driveFileId = appResult.exe_file_id || '';
            btnApply.onclick = function() {
                btnApply.disabled = true;
                api.apply_update(downloadUrl, driveFileId).then(function(result) {
                    if (result.success) { setTimeout(function() { api.exit_app(); }, 600); }
                    else { btnApply.disabled = false; alert(result.error || '업데이트 적용에 실패했습니다.'); }
                });
            };
            btnDownload.onclick = function() {
                if (downloadUrl) api.open_download_url(downloadUrl);
                else if (driveFileId) api.open_download_url('https://drive.google.com/uc?export=download&id=' + driveFileId);
                modal.classList.remove('show');
            };
            document.getElementById('closeUpdateModal').onclick = function() { modal.classList.remove('show'); };
            modal.classList.add('show');
        }).catch(function() {});
    }

    function bootstrap(data) {
        CREATURES_DATA = data.base || CREATURES_DATA;
        _userState = data.user || _userState;
        document.getElementById('loadingState').remove();
        var total = (CREATURES_DATA.어류||[]).length + (CREATURES_DATA.곤충||[]).length + (CREATURES_DATA.조류||[]).length + (CREATURES_DATA.요리||[]).length;
        var hint = document.getElementById('emptyDataHint');
        var errHint = document.getElementById('dataErrorHint');
        if (hint) hint.style.display = total === 0 ? 'block' : 'none';
        if (errHint) {
            var msg3 = data.lastError || '';
            errHint.textContent = msg3 ? ('데이터 로드 참고: ' + msg3 + ' — 「데이터 새로고침」을 눌러 최신 GitHub 파일을 다시 받아 보세요.') : '';
            errHint.style.display = msg3 ? 'block' : 'none';
        }
        setVersionInfo(data.appVersion, data.dataVersion);
        App.init();
        setTimeout(function() { checkAppUpdate(false); }, 500);
    }

    function runBootstrap() {
        var api = getApi();
        if (!api) {
            document.getElementById('loadingState').textContent = 'API를 사용할 수 없습니다.';
            return;
        }
        api.get_app_data().then(bootstrap).catch(function(err) {
            document.getElementById('loadingState').textContent = '데이터 로드 실패: ' + (err.message || err);
        });
    }
    if (window.pywebview) {
        window.addEventListener('pywebviewready', runBootstrap);
    } else {
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', runBootstrap);
        else runBootstrap();
    }
})();
    </script>
</body>
